<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de Moedas</title>

    <link rel="stylesheet" href="style.css">
    <script src="main.js" defer></script>
</head>
<body>

<div class="converter">

    <h2>Conversor de Moedas</h2>

    <div class="campo">
        <label for="valor">Valor em Real (BRL)</label>
        <input
            type="number"
            id="valor"
            placeholder="Digite o valor em reais">
    </div>

    <div class="campo">
        <label for="moedaDestino">Converter para</label>

        <select id="moedaDestino">
            <option value="USD">Dólar (USD)</option>
            <option value="JPY">Yen (JPY)</option>
        </select>
    </div>

    <div class="bandeira-container">
        <img
            id="bandeira"
            src="https://flagcdn.com/w160/us.png"
            alt="Bandeira">

        <p id="nomeMoeda">Dólar Americano</p>
    </div>

    <button id="converter">Converter</button>

    <div class="resultado" id="resultado">
        Resultado: --
    </div>

</div>

<footer>
    Desenvolvido por Ryan S Medeiros
</footer>

</body>
</html>
